name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "release" ]]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_TAG"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer tag: $tag" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v$package_version"
          if [[ "${{ steps.release.outputs.tag }}" != "$expected_tag" ]]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match package.json version $package_version" >&2
            exit 2
          fi

      - name: Install package metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --ignore-scripts
          fi

      - name: Verify package
        run: npm run check

      - name: Publish
        run: npm publish --access public
